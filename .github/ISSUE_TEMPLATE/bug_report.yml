name: Bug report
description: Something in wpguard-mcp doesn't work the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Found a security vulnerability instead? **Don't file it here.** Use
        [Report a vulnerability](https://github.com/cgallic/wpguard-mcp/security/advisories/new)
        under the Security tab, or see SECURITY.md.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: The exact tool call(s) or CLI command(s), including relevant arguments (redact tokens/secrets).
      placeholder: |
        1. wp_mutate_option(site="example.com", option_name="blogname", new_value="Test", apply=False)
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: wpguard-mcp version / commit
      placeholder: v0.1.0, or a commit SHA if running from main
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - SSH + WP-CLI
        - Companion plugin
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / audit output
      description: Output of `wpguard audit` for the affected packet, if any. Redact tokens, keys, and site secrets.
      render: shell
    validations:
      required: false
