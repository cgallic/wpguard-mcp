name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  docker:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # workflow_dispatch (e.g. a pre-tag dry run from main) builds for every
      # target platform but does not push -- there is no tag to derive a
      # version from, and we don't want an untagged/mislabeled image in GHCR.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  companion-plugin-release:
    name: Package companion plugin + create GitHub Release
    # Only a real tag push has a version to name the zip after and a ref a
    # GitHub Release can attach to -- workflow_dispatch from a branch has
    # neither, so skip this job on manual runs rather than fail or publish
    # something wrong.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package wp-plugin as a versioned zip
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="wpguard-companion"
          mkdir -p "$STAGE"
          cp wp-plugin/wpguard-companion.php "$STAGE/"
          ZIP="wpguard-companion-${VERSION}.zip"
          zip -r "$ZIP" "$STAGE"
          sha256sum "$ZIP" > "${ZIP}.sha256"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "checksum=${ZIP}.sha256" >> "$GITHUB_OUTPUT"

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.checksum }}
